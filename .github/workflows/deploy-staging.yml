name: deploy-staging

on:
  push:
    branches: [main]
  # Manual re-run without a new commit.
  workflow_dispatch:

# Staging moves fast too — cancel in-flight on a new push to main.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-southeast1
  IMAGE: asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/meetworld-backend/app
  SERVICE: meetworld-backend-staging
  TAG: staging

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          ## use this if you use Workload Identity Federation (WIF)
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Migrate database
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run TypeORM migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm typeorm migration:run -d src/data-source.ts

  deploy:
    name: Deploy to Cloud Run
    needs: migrate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          ## use this if you use Workload Identity Federation (WIF)
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy revision
        run: |
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE:$TAG" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated

  # Confirms the freshly-deployed revision actually serves traffic. gcloud
  # run deploy returns success as soon as the revision is registered; if the
  # container crashes on startup (env var typo, bad DB URL, etc.) the deploy
  # silently "succeeds". This step catches that before anyone hits the URL.
  smoke-test:
    name: Smoke test (health endpoint)
    needs: deploy
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - id: url
        name: Resolve deployed service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
            --region="$REGION" \
            --format='value(status.url)')
          if [ -z "$URL" ]; then
            echo "::error::Failed to resolve service URL"
            exit 1
          fi
          echo "service-url=$URL" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 "${{ steps.url.outputs.service-url }}/api/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::Health check failed after 6 attempts"
          exit 1