name: migration

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Node first
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 2. Setup pnpm and handle caching here directly
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 3. Get pnpm store directory for explicit caching if needed, 
      # or rely on pnpm's built-in handling.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm run lint
      - run: pnpm test

  migrate-prod:
    needs: test
    runs-on: ubuntu-latest
    environment: production-requires-approval
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # Using standard install instead of forcing the store cache interaction via setup-node
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Run database migrations
        run: pnpm typeorm migration:run -d src/data-source.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production