name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/meetworld-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/meetworld-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==========================================
      # DEPLOYING TO YOUR EXISTING CLOUD RUN
      # ==========================================

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Make sure this key is added to GitHub Secrets!

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: meetworld-backend  # Matches your exact service name
          region: asia-southeast3     # Matches your exact region (Jakarta)
          image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/meetworld-backend:${{ github.sha }}