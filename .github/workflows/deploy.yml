name: Build and Push to Docker Hub

# Trigger the workflow only when code is pushed to the 'main' branch
on:
#   push:
#     branches:
#       - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (allows advanced caching and multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub using the secrets configured earlier
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build the image and push it to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Tags the image both with the commit SHA and 'latest'
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/meetworld-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/meetworld-backend:${{ github.sha }}
          # Leverages GitHub Actions cache to speed up multi-stage pnpm builds
          cache-from: type=gha
          cache-to: type=gha,mode=max