name: release

on:
  # push:
  #   branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm test

  migrate-prod:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Run database migrations
        run: pnpm run migration:run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production

  deploy-prod:
    needs: migrate-prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy application
        run: |
          echo "Add your deploy step here."
          echo "Examples:"
          echo "  - fly deploy"
          echo "  - railway up"
          echo "  - rsync over SSH"
          echo "  - docker push + container restart"
