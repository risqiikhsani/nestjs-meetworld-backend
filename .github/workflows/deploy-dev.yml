name: deploy-dev

on:
  push:
    branches: [dev]
  # Manual re-run without pushing a new commit (e.g. to re-deploy after a
  # Cloud Run service was deleted or env vars were updated out-of-band).
  workflow_dispatch:

# Dev moves fast — cancel any in-flight deploy when a new commit lands.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-southeast1
  IMAGE: asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/meetworld/backend
  SERVICE: meetworld-backend-dev
  TAG: dev

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          ## use this if you use Workload Identity Federation (WIF)
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-,format=short

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Migrate database
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # data-source.ts points entities/migrations at dist/, so build first.
      - name: Build
        run: pnpm run build

      - name: Run TypeORM migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm typeorm migration:run -d src/data-source.ts

  deploy:
    name: Deploy to Cloud Run
    needs: migrate
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          ## use this if you use Workload Identity Federation (WIF)
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy revision
        run: |
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE:$TAG" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated